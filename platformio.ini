; PlatformIO Project Configuration File
;
;   STM32F407VET6 双环境配置:
;     [env:bootloader] — OTA Bootloader (48KB, 扇区 0-2)
;     [env:app]        — 业务 APP (128KB, 扇区 5=APP1)
;
;   开发流程:
;     1. 首次烧录: pio run -e bootloader --target upload
;     2. 日常烧录: pio run -e app --target upload
;     3. OTA 升级: APP 运行时通过 ESP32 下载到 APP2 → 自动切换

; ============================ Bootloader ============================
[env:bootloader]
platform = ststm32
board = genericSTM32F407VET6
framework = stm32cube
board_build.f_cpu = 168000000L
board_build.ldscript = src/bootloader/bootloader.ld

build_flags =
    -D BOOTLOADER
    -D STM32F407xx
    -I src/bootloader
    -I src/bootloader/shared

build_src_filter = -<*> +<bootloader/>

debug_tool = stlink
upload_protocol = stlink

; ============================ APP (业务代码) ============================
[env:app]
platform = ststm32
board = genericSTM32F407VET6
framework = arduino
board_build.f_cpu = 168000000L
board_build.ldscript = src/bootloader/app_offset.ld

lib_deps =
    stm32duino/STM32duino FreeRTOS@^10.3.2
    epsilonrt/Modbus-Serial@^2.0.5
    epsilonrt/Modbus-Ethernet@^1.0.3
    bblanchon/ArduinoJson@^7.0.4

debug_tool = stlink
upload_protocol = stlink
monitor_speed = 115200

build_flags =
    -D APP_PARTITION=1
    -D TCP_KEEP_ALIVE
    -Wl,-u,_printf_float
    -I src/bsp
    -I src/drivers
    -I src/modules
    -I src/modules/modbus
    -I src/modules/shared
    -I src/app
    -I src/bootloader/shared

build_src_filter =
    +<*>
    -<bootloader/main.c>
    -<bootloader/flash_drv.c>
    -<bootloader/flash_drv.h>
    -<bootloader/metadata.c>
    -<bootloader/metadata.h>
    -<bootloader/hmac_sha256.c>
    -<bootloader/hmac_sha256.h>
    -<bootloader/sha256.c>
    -<bootloader/sha256.h>
    -<bootloader/bootloader.ld>
    -<bootloader/app.ld>
    -<bootloader/app_offset.ld>

extra_scripts = Resource/extra_script.py
